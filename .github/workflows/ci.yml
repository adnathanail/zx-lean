name: CI

on:
  push:
  pull_request:

jobs:
  zx_lean:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: zx_view_widget/package.json
          cache: npm
          cache-dependency-path: zx_view_widget/package-lock.json
      - uses: leanprover/lean-action@v1

  pyzx_daemon:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pyzx_daemon

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyzx_daemon/.python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Check formatting
        run: uv run ruff format --check
      - name: Run linting
        run: uv run ruff check
      - name: Run typechecking
        run: uv run ty check
      - name: Run tests
        run: uv run pytest

  zx_view_widget:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zx_view_widget

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: zx_view_widget/package.json
          cache: npm
          cache-dependency-path: zx_view_widget/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
